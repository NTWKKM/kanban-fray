<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Planning Board 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --lane-bg: #1e293b;
            --border-color: #334155;
            --text-color: #f8fafc;
            --header-bg: #0f172a;
        }
        .theme-white {
            --bg-color: #f8fafc;
            --lane-bg: #f1f5f9;
            --border-color: #cbd5e1;
            --text-color: #0f172a;
            --header-bg: #ffffff;
        }
        .theme-dark {
            --bg-color: #0f172a;
            --lane-bg: #1e293b;
            --border-color: #334155;
            --text-color: #f8fafc;
            --header-bg: #0f172a;
        }
        .theme-dracula {
            --bg-color: #282a36;
            --lane-bg: #44475a;
            --border-color: #6272a4;
            --text-color: #f8f8f2;
            --header-bg: #282a36;
        }
        .theme-vintage {
            --bg-color: #f4ecd8;
            --lane-bg: #eaddca;
            --border-color: #bda586;
            --text-color: #5d4037;
            --header-bg: #efe3c8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: auto;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .board-container {
            display: flex;
            gap: 1.5rem;
            padding: 2rem;
            min-height: calc(100vh - 100px);
            align-items: flex-start;
        }
        .phase-lane {
            background-color: var(--lane-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            min-width: 320px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .phase-lane.hidden-divider {
            background-color: transparent;
            border: none;
            background-image: linear-gradient(to right, var(--border-color) 1px, transparent 1px);
            background-size: 320px 100%;
        }
        .job-card {
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            z-index: 5;
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .job-card.selected {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }
        #canvas-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .job-wrapper {
            position: relative;
            z-index: 10;
        }
        .anchor-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #60a5fa;
            border-radius: 50%;
            z-index: 20;
            cursor: crosshair;
            display: none;
            transition: transform 0.2s;
        }
        .job-wrapper:hover .anchor-point {
            display: block;
        }
        .anchor-point:hover {
            transform: scale(1.5);
            background: #fff;
        }
        .anchor-top { top: -4px; left: 50%; transform: translateX(-50%); }
        .anchor-bottom { bottom: -4px; left: 50%; transform: translateX(-50%); }
        .anchor-left { left: -4px; top: 50%; transform: translateY(-50%); }
        .anchor-right { right: -4px; top: 50%; transform: translateY(-50%); }
        .anchor-tl { top: -4px; left: -4px; }
        .anchor-tr { top: -4px; right: -4px; }
        .anchor-bl { bottom: -4px; left: -4px; }
        .anchor-br { bottom: -4px; right: -4px; }
    </style>
</head>
<body class="theme-dark">
 
    <!-- Top Navigation -->
    <header class="h-16 border-b border-slate-700 flex items-center justify-between px-6 sticky top-0 bg-slate-900/80 backdrop-blur-md z-50" style="background-color: var(--header-bg); border-color: var(--border-color); color: var(--text-color);">
        <div class="flex items-center gap-4">
            <input type="text" id="boardTitle" onchange="saveBoardTitle()" class="text-xl font-bold tracking-tight bg-transparent border-b border-transparent hover:border-slate-500 focus:border-blue-500 outline-none px-1 transition-all" value="Planning Board 2.0">
            <button onclick="addPhase()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                <span>+</span> Add Phase
            </button>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 text-sm" style="color: var(--text-color); opacity: 0.7;">
                <select onchange="setTheme(this.value)" class="bg-slate-700 text-white text-xs rounded px-2 py-1 outline-none border border-slate-600 cursor-pointer">
                    <option value="theme-dark">Dark</option>
                    <option value="theme-white">White</option>
                    <option value="theme-dracula">Dracula</option>
                    <option value="theme-vintage">Vintage</option>
                </select>
                <input type="checkbox" id="toggleDividers" onchange="toggleDividers()" class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-blue-600 focus:ring-blue-500">
                <label for="toggleDividers">Hide Phase Dividers</label>
            </div>
            <button onclick="clearAllConnections()" class="text-xs text-red-400 hover:text-red-300 underline">Clear All Arrows</button>
        </div>
    </header>
 
    <div class="relative">
        <!-- SVG Layer for Arrows -->
        <svg id="canvas-svg"></svg>
 
        <main id="board" class="board-container">
            <!-- Phases will be injected here -->
        </main>
    </div>
 
    <!-- Job Modal -->
    <div id="jobModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[100]">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-600 w-full max-w-md shadow-2xl text-white">
            <h3 id="modalTitle" class="text-lg font-bold mb-4">Job Details</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Job Title</label>
                        <input type="text" id="jobTitle" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Responsible</label>
                        <input type="text" id="jobUser" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Details</label>
                    <textarea id="jobDesc" rows="3" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Shape</label>
                        <select id="jobShape" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white outline-none">
                            <option value="rectangle">Rectangle</option>
                            <option value="rounded">Rounded</option>
                            <option value="circle">Circle</option>
                            <option value="pill">Pill</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Size</label>
                        <select id="jobSize" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white outline-none">
                            <option value="small">Small</option>
                            <option value="medium" selected>Medium</option>
                            <option value="large">Large</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Color</label>
                    <div class="flex gap-2 mt-2">
                        <button onclick="setJobColor('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-transparent" data-color="#3b82f6"></button>
                        <button onclick="setJobColor('#ef4444')" class="w-6 h-6 rounded-full bg-red-500 border-2 border-transparent" data-color="#ef4444"></button>
                        <button onclick="setJobColor('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 border-2 border-transparent" data-color="#10b981"></button>
                        <button onclick="setJobColor('#f59e0b')" class="w-6 h-6 rounded-full bg-amber-500 border-2 border-transparent" data-color="#f59e0b"></button>
                        <button onclick="setJobColor('#a855f7')" class="w-6 h-6 rounded-full bg-purple-500 border-2 border-transparent" data-color="#a855f7"></button>
                        <button onclick="setJobColor('#64748b')" class="w-6 h-6 rounded-full bg-slate-500 border-2 border-transparent" data-color="#64748b"></button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-400 hover:text-white transition-colors">Cancel</button>
                <button onclick="saveJob()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md font-medium">Save Job</button>
            </div>
        </div>
    </div>
 
    <!-- Connection Modal -->
    <div id="connModal" class la-la" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[110]">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-600 w-full max-w-md shadow-2xl text-white">
            <h3 class="text-lg font-bold mb-4">Connection Properties</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Style</label>
                        <select id="connStyle" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white outline-none">
                            <option value="line">Plain Line</option>
                            <option value="arrow">One-way Arrow</option>
                            <option value="bidirectional">Two-way Arrow</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Thickness</label>
                        <input type="number" id="connThickness" min="1" max="10" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Color</label>
                    <div class="flex gap-2 mt-2">
                        <button onclick="setConnColor('#60a5fa')" class="w-6 h-6 rounded-full bg-blue-400 border-2 border-transparent" data-conn-color="#60a5fa"></button>
                        <button onclick="setConnColor('#f87171')" class="w-6 h-6 rounded-full bg-red-400 border-2 border-transparent" data-conn-color="#f87171"></button>
                        <button onclick="setConnColor('#34d399')" class="w-6 h-6 rounded-full bg-emerald-400 border-2 border-transparent" data-conn-color="#34d399"></button>
                        <button onclick="setConnColor('#fbbf24')" class="w-6 h-6 rounded-full bg-amber-400 border-2 border-transparent" data-conn-color="#fbbf24"></button>
                        <button onclick="setConnColor('#c084fc')" class="w-6 h-6 rounded-full bg-purple-400 border-2 border-transparent" data-conn-color="#c084fc"></button>
                        <button onclick="setConnColor('#ffffff')" class="w-6 h-6 rounded-full bg-white border-2 border-transparent" data-conn-color="#ffffff"></button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeConnModal()" class="px-4 py-2 text-slate-400 hover:text-white transition-colors">Cancel</button>
                <button onclick="saveConnection()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md font-medium">Save Style</button>
            </div>
        </div>
    </div>
 
    <script>
        let state = {
            phases: [],
            jobs: [],
            connections: [],
            selectedJobId: null,
            currentColor: '#3b82f6',
            boardTitle: 'Planning Board 2.0',
            currentTheme: 'theme-dark'
        };
        
        let currentEditingJobId = null;
        let currentEditingConnId = null;
        let connectionSourceId = null;
        let connectionSourceAnchor = null;
        let currentConnColor = '#60a5fa';

        function setTheme(theme) {
            state.currentTheme = theme;
            document.body.className = theme;
        }

        function saveBoardTitle() {
            state.boardTitle = document.getElementById('boardTitle').value;
        }

        function addPhase() {
            const name = prompt("Enter Phase Name:", `Phase ${state.phases.length + 1}`);
            if (!name) return;
            
            const phaseId = 'phase_' + Date.now();
            state.phases.push({ id: phaseId, name: name });
            renderBoard();
        }
        
        function addJob(phaseId) {
            const jobId = 'job_' + Date.now();
            state.jobs.push({
                id: jobId,
                phaseId: phaseId,
                title: 'New Job',
                desc: '',
                user: '',
                color: state.currentColor,
                shape: 'rectangle',
                size: 'medium'
            });
            openJobModal(jobId);
            renderBoard();
        }
        
        function openJobModal(jobId) {
            currentEditingJobId = jobId;
            const job = state.jobs.find(j => j.id === jobId);
            
            document.getElementById('jobTitle').value = job.title;
            document.getElementById('jobDesc').value = job.desc;
            document.getElementById('jobUser').value = job.user;
            document.getElementById('jobShape').value = job.shape;
            document.getElementById('jobSize').value = job.size;
            setJobColor(job.color);
            
            document.getElementById('jobModal').style.display = 'flex';
        }
        
        function setJobColor(color) {
            state.currentColor = color;
            document.querySelectorAll('[data-color]').forEach(el => {
                el.style.borderColor = el.getAttribute('data-color') === color ? '#fff' : 'transparent';
            });
        }
        
        function saveJob() {
            const job = state.jobs.find(j => j.id === currentEditingJobId);
            job.title = document.getElementById('jobTitle').value;
            job.desc = document.getElementById('jobDesc').value;
            job.user = document.getElementById('jobUser').value;
            job.shape = document.getElementById('jobShape').value;
            job.size = document.getElementById('jobSize').value;
            job.color = state.currentColor;
            
            closeModal();
            renderBoard();
        }
        
        function closeModal() {
            document.getElementById('jobModal').style.display = 'none';
            currentEditingJobId = null;
        }
        
        function toggleDividers() {
            const isHidden = document.getElementById('toggleDividers').checked;
            document.querySelectorAll('.phase-lane').forEach(lane => {
                isHidden ? lane.classList.add('hidden-divider') : lane.classList.remove('hidden-divider');
            });
        }
        
        function selectJob(jobId) {
            if (state.selectedJobId === null) {
                state.selectedJobId = jobId;
                renderBoard();
            } else if (state.selectedJobId === jobId) {
                state.selectedJobId = null;
                renderBoard();
            } else {
                state.selectedJobId = null;
                renderBoard();
            }
        }

        function handleAnchorClick(jobId, anchorId) {
            if (!connectionSourceId) {
                startConnection(jobId, anchorId);
            } else {
                endConnection(jobId, anchorId);
            }
        }

        function startConnection(jobId, anchorId) {
            connectionSourceId = jobId;
            connectionSourceAnchor = anchorId;
            renderBoard();
        }

        function endConnection(jobId, anchorId) {
            if (connectionSourceId === jobId) {
                connectionSourceId = null;
                connectionSourceAnchor = null;
                renderBoard();
                return;
            }

            createConnection(connectionSourceId, connectionSourceAnchor, jobId, anchorId);
            connectionSourceId = null;
            connectionSourceAnchor = null;
            renderBoard();
        }

        function createConnection(fromId, fromAnchor, toId, toAnchor) {
            const existing = state.connections.find(c => c.from === toId && c.to === fromId);
            if (existing) {
                existing.bidirectional = true;
                existing.style = 'bidirectional';
            } else {
                state.connections.push({ 
                    id: 'conn_' + Date.now(),
                    from: fromId, 
                    fromAnchor: fromAnchor, 
                    to: toId, 
                    toAnchor: toAnchor, 
                    bidirectional: false,
                    style: 'arrow', 
                    color: '#60a5fa',
                    thickness: 2
                });
            }
        }
        
        function clearAllConnections() {
            state.connections = [];
            renderBoard();
        }
        
        function openConnModal(connId) {
            currentEditingConnId = connId;
            const conn = state.connections.find(c => c.id === connId);
            
            document.getElementById('connStyle').value = conn.style;
            document.getElementById('connThickness').value = conn.thickness;
            currentConnColor = conn.color;
            
            document.querySelectorAll('[data-conn-color]').forEach(el => {
                el.style.borderColor = el.getAttribute('data-conn-color') === conn.color ? '#fff' : 'transparent';
            });

            document.getElementById('connModal').style.display = 'flex';
        }

        function setConnColor(color) {
            currentConnColor = color;
            document.querySelectorAll('[data-conn-color]').forEach(el => {
                el.style.borderColor = el.getAttribute('data-conn-color') === color ? '#fff' : 'transparent';
            });
        }

        function saveConnection() {
            const conn = state.connections.find(c => c.id === currentEditingConnId);
            conn.style = document.getElementById('connStyle').value;
            conn.thickness = parseInt(document.getElementById('connThickness').value);
            conn.color = currentConnColor;
            
            conn.bidirectional = (conn.style === 'bidirectional');

            closeConnModal();
            renderBoard();
        }

        function closeConnModal() {
            document.getElementById('connModal').style.display = 'none';
            currentEditingConnId = null;
        }
        
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            state.phases.forEach(phase => {
                const lane = document.createElement('div');
                lane.className = `phase-lane ${document.getElementById('toggleDividers').checked ? 'hidden-divider' : ''}`;
                
                lane.innerHTML = `
                    <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50 rounded-t-xl">
                        <h2 class="font-bold text-slate-200">${phase.name}</h2>
                        <button onclick="addJob('${phase.id}')" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-slate-300 transition-colors">+ Job</button>
                    </div>
                    <div class="p-3 space-y-3 flex-1">
                        ${state.jobs.filter(j => j.phaseId === phase.id).map(job => {
                            const sizeClass = job.size === 'small' ? 'w-48 h-24' : job.size === 'large' ? 'w-64 h-32' : 'w-60 h-28';
                            const shapeClass = job.shape === 'circle' ? 'rounded-full aspect-square w-32 h-32' : job.shape === 'pill' ? 'rounded-full' : job.shape === 'rounded' ? 'rounded-lg' : 'rounded-none';
                            
                            return `
                            <div class="job-wrapper ${sizeClass} ${shapeClass}">
                                <div onclick="selectJob('${job.id}')" 
                                     class="job-card p-3 w-full h-full rounded-inherit border-l-4 ${state.selectedJobId === job.id ? 'selected' : ''}" 
                                     style="background-color: #2d3748; border-color: ${job.color}">
                                    <div class="flex justify-between items-start mb-1">
                                        <span class="font-semibold text-sm text-slate-100">${job.title}</span>
                                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-400">${job.user || 'Unassigned'}</span>
                                    </div>
                                    <p class="text-xs text-slate-400 line-clamp-2">${job.desc || 'No details...'}</p>
                                </div>
                                <div class="anchor-point anchor-top" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'top')"></div>
                                <div class="anchor-point anchor-bottom" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'bottom')"></div>
                                <div class="anchor-point anchor-left" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'left')"></div>
                                <div class="anchor-point anchor-right" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'right')"></div>
                                <div class="anchor-point anchor-tl" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'tl')"></div>
                                <div class="anchor-point anchor-tr" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'tr')"></div>
                                <div class="anchor-point anchor-bl" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'bl')"></div>
                                <div class="anchor-point anchor-br" onclick="event.stopPropagation(); handleAnchorClick('${job.id}', 'br')"></div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                board.appendChild(lane);
            });
            
            drawConnections();
        }
        
        function drawConnections() {
            const svg = document.getElementById('canvas-svg');
            svg.innerHTML = '';
            
            state.connections.forEach(conn => {
                const fromEl = document.querySelector(`[onclick="selectJob('${conn.from}')"]`);
                const toEl = document.querySelector(`[onclick="selectJob('${conn.to}')"]`);
                
                if (!fromEl || !toEl) return;
                
                const fromRect = fromEl.getBoundingClientRect();
                const toRect = toEl.getBoundingClientRect();
                
                const getAnchorPos = (rect, anchor) => {
                    const midX = rect.left + rect.width / 2;
                    const midY = rect.top + rect.height / 2;
                    
                    switch(anchor) {
                        case 'top': return { x: midX, y: rect.top };
                        case 'bottom': return { x: midX, y: rect.bottom };
                        case 'left': return { x: rect.left, y: midY };
                        case 'right': return { x: rect.left + rect.width, y: midY };
                        case 'tl': return { x: rect.left, y: rect.top };
                        case 'tr': return { x: rect.left + rect.width, y: rect.top };
                        case 'bl': return { x: rect.left, y: rect.bottom };
                        case 'br': return { x: rect.left + rect.width, y: rect.bottom };
                        default: return { x: midX, y: midY };
                    }
                };
                
                const start = getAnchorPos(fromRect, conn.fromAnchor);
                const end = getAnchorPos(toRect, conn.toAnchor);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const dx = end.x - start.x;
                const dy = end.y - start.y;
                
                const d = `M ${start.x} ${start.y} C ${start.x + dx/2} ${start.y}, ${end.x - dx/2} ${end.y}, ${end.x} ${end.y}`;
                
                line.setAttribute('d', d);
                line.setAttribute('stroke', conn.color);
                line.setAttribute('stroke-width', conn.thickness);
                line.setAttribute('fill', 'none');
                
                if (conn.style === 'arrow') {
                    line.setAttribute('marker-end', 'url(#arrow)');
                } else if (conn.style === 'bidirectional') {
                    line.setAttribute('marker-end', 'url(#arrow)');
                    const revLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const revD = `M ${end.x} ${end.y} C ${end.x - dx/2} ${end.y}, ${start.x + dx/2} ${start.y}, ${start.x} ${start.y}`;
                    revLine.setAttribute('d', revD);
                    revLine.setAttribute('stroke', conn.color);
                    revLine.setAttribute('stroke-width', conn.thickness);
                    revLine.setAttribute('fill', 'none');
                    revLine.setAttribute('marker-end', 'url(#arrow)');
                    svg.appendChild(revLine);
                }
                
                line.setAttribute('class', 'transition-all duration-300');
                line.onclick = () => openConnModal(conn.id);
                line.style.cursor = 'pointer';
                
                svg.appendChild(line);
            });
            
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            defs.innerHTML = `
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa" />
                </marker>
S`;
            svg.appendChild(defs);
        }
        
        window.addEventListener('resize', drawConnections);
        window.addEventListener('scroll', drawConnections);
        
        renderBoard();
    </script>
</body>
</html>
