<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBoard Pro - Smart Whiteboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar" id="toolbar">
        <div class="tool-btn active" data-tool="select" title="Select (V)"><i class="fas fa-mouse-pointer"></i></div>
        <div class="tool-btn" data-tool="rectangle" title="Rectangle (R)"><i class="far fa-square"></i></div>
        <div class="tool-btn" data-tool="diamond" title="Diamond (D)"><i class="fas fa-gem"></i></div>
        <div class="tool-btn" data-tool="circle" title="Circle (O)"><i class="far fa-circle"></i></div>
        <div class="tool-btn" data-tool="line" title="Line (L)"><i class="fas fa-minus"></i></div>
        <div class="tool-btn" data-tool="arrow" title="Arrow (A)"><i class="fas fa-long-arrow-alt-right"></i></div>
        <div class="tool-btn" data-tool="pencil" title="Pencil (P)"><i class="fas fa-pencil-alt"></i></div>
        <div class="tool-btn" data-tool="text" title="Text (T)"><i class="fas fa-font"></i></div>
        <div class="w-px h-6 bg-slate-200 mx-1 my-auto"></div>
        <div class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></div>
        <div class="tool-btn" id="redo-btn" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></div>
        <div class="tool-btn" id="clear-btn" title="Clear Canvas"><i class="fas fa-trash"></i></div>
    </div>

    <div class="properties-panel">
        <h3 class="text-sm font-bold mb-3 text-slate-700">Style</h3>
        <div class="space-y-4">
            <div class="flex flex-col gap-2">
                <label class="text-xs text-slate-500">Stroke Color</label>
                <div class="flex gap-2 flex-wrap">
                    <button class="w-6 h-6 rounded-full bg-black border border-slate-300" data-color="#000000"></button>
                    <button class="w-6 h-6 rounded-full bg-red-500 border border-slate-300" data-color="#ef4444"></button>
                    <button class="w-6 h-6 rounded-full bg-blue-500 border border-slate-300" data-color="#3b82f6"></button>
                    <button class="w-6 h-6 rounded-full bg-green-500 border border-slate-300" data-color="#10b981"></button>
                    <button class="w-6 h-6 rounded-full bg-yellow-500 border border-slate-300" data-color="#f59e0b"></button>
                </div>
                <input type="color" id="custom-color" class="w-full h-6 cursor-pointer bg-transparent border-none" value="#000000">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-xs text-slate-500">Fill Color</label>
                <div class="flex gap-2">
                    <button class="w-6 h-6 rounded-full bg-white border border-slate-300" data-fill="transparent"></button>
                    <button class="w-6 h-6 rounded-full bg-blue-100 border border-slate-300" data-fill="#dbeafe"></button>
                    <button class="w-6 h-6 rounded-full bg-red-100 border border-slate-300" data-fill="#fee2e2"></button>
                    <button class="w-6 h-6 rounded-full bg-green-100 border border-slate-300" data-fill="#dcfce7"></button>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-xs text-slate-500">Sloppiness</label>
                <input type="range" id="roughness-slider" min="0" max="5" step="0.1" value="1.5" class="w-full accent-blue-500">
            </div>
        </div>
    </div>

    <div class="action-panel">
        <h3 class="text-xs font-bold text-slate-400 uppercase mb-1">Smart Tools</h3>
        <button class="action-btn" id="tidy-btn"><i class="fas fa-magic"></i> Auto-Tidy</button>
        <button class="action-btn" id="export-btn"><i class="fas fa-download"></i> Export PNG</button>
    </div>

    <div class="canvas-overlay">
        Pan: Space+Drag | Zoom: Ctrl+Scroll/Pinch | <span id="zoom-level">100%</span>
    </div>

    <textarea id="text-editor" class="hidden"></textarea>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
